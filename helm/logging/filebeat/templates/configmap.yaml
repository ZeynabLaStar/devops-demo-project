apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.appName }}-config
  namespace: {{ .Values.namespace }}
  labels:
    k8s-app: {{ .Values.appName }}
    
data:
  filebeat.yml: |-
    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log

    setup.dashboards.enabled: true
    setup.kibana:
      host: kibana-service:5601

    output.elasticsearch:
      hosts: ["es-master-service:9200"]
